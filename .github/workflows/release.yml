name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # 只要推送以 v 开头的 tag (如 v1.0.0) 就会触发自动打包

permissions:
  contents: write # 必须赋予写入权限，以便 GitHub Action 创建 Release 和上传 APK 附件

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 符合 package.json 要求的 Node 版本
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 极速且干净地安装依赖

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # React Native 推荐的 Java 版本
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的 Token，无需手动配置
