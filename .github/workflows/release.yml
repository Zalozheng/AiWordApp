name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # 只有当你打上以 v 开头的 tag 时才会触发自动打包发布，比如 v1.0.0
  workflow_dispatch: # 这个允许你在 GitHub 网页上手动点击按钮触发打包

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取最新代码 (Checkout repository)
        uses: actions/checkout@v3

      - name: 🟢 设置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: ☕ 设置 Java 环境 (React Native 安卓必需)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 缓存 Gradle (加速打包)
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 📦 安装 NPM 依赖
        run: npm install

      # 【如果你不在本地传 assets 切片，想让云端自己算词库，取消注释下面这行。但通常建议你在本地跑完提交切片】
      # - name: 📚 生成本地词库切片 (可选)
      #   run: node build_dict.js word.json

      - name: 🔨 编译 Android Release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: 🚀 将打包出的 APK 作为产物保存
        uses: actions/upload-artifact@v3
        with:
          name: AiWord-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: 🎁 自动在 GitHub 创建 Release 发布页
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
